name: 'My composite Action'
description: 'A reusable composite actions that checks out code and sets up Node.js'

inputs:
  node-version:
    description: 'The Node.js version to use'
    required: true
  registry-url:
    required: true
  scope:
    required: true

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-verson: ${{ inputs.node-verson }}
        registry-url: ${{ inputs.registry-url }}
        scope: ${{ inputs.scope }}
